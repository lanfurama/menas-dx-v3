# Deploy phulonghotels: chỉ domain biết port 3006 (frontend). Backend chạy nội bộ, Nginx proxy /api.
# Đặt vào /etc/nginx/sites-available/ rồi symlink sites-enabled, sudo nginx -t && sudo systemctl reload nginx.

server {
    listen 3006;
    server_name phulonghotels;
    root /var/www/menas-dx-v3/dist;   # thay đúng path build frontend (pnpm build)
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
